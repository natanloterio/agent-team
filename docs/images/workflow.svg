<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- connectors -->
  <g stroke="#94a3b8" stroke-width="2" fill="none">
    <line x1="230" y1="76"  x2="230" y2="106" marker-end="url(#arrow)"/>
    <line x1="230" y1="176" x2="230" y2="214" marker-end="url(#arrow)"/>
    <line x1="272" y1="247" x2="476" y2="247" marker-end="url(#arrow)"/>
    <line x1="476" y1="300" x2="272" y2="300" marker-end="url(#arrow)"/>
    <line x1="230" y1="318" x2="230" y2="356" marker-end="url(#arrow)"/>
  </g>

  <!-- goal pill -->
  <rect x="105" y="32" width="250" height="44" rx="22" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="230" y="60" text-anchor="middle" font-size="15" fill="#334155">you describe a goal</text>

  <!-- team-leader -->
  <rect x="105" y="108" width="250" height="68" rx="10" fill="#6366f1"/>
  <text x="230" y="138" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">team-leader</text>
  <text x="230" y="160" text-anchor="middle" font-size="12.5" fill="#e0e7ff">plans → writes tasks</text>

  <!-- todo tag -->
  <rect x="185" y="232" width="90" height="32" rx="7" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="230" y="253" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">todo/</text>

  <!-- done tag -->
  <rect x="185" y="285" width="90" height="32" rx="7" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="230" y="306" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">done/</text>

  <!-- workers -->
  <rect x="478" y="234" width="240" height="84" rx="10" fill="#10b981"/>
  <text x="598" y="263" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">workers</text>
  <text x="598" y="285" text-anchor="middle" font-size="12.5" fill="#d1fae5">build in isolated worktrees,</text>
  <text x="598" y="302" text-anchor="middle" font-size="12.5" fill="#d1fae5">open PRs</text>

  <!-- reviewer -->
  <rect x="105" y="358" width="250" height="68" rx="10" fill="#f59e0b"/>
  <text x="230" y="388" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">reviewer</text>
  <text x="230" y="410" text-anchor="middle" font-size="12.5" fill="#fff7ed">verifies + auto-merges passing PRs</text>
</svg>
