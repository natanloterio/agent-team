<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="DejaVu Sans, Helvetica, Arial, sans-serif">
  <rect width="1080" height="1350" fill="#0f172a"/>
  <rect x="0" y="0" width="1080" height="8" fill="#fbbf24"/>
  <text x="90" y="160" font-size="30" font-weight="700" letter-spacing="6" fill="#fbbf24">O PROBLEMA DE SEMPRE</text>

  <text x="90" y="430" font-size="72" font-weight="800" fill="#f8fafc">Todo time tem um</text>
  <text x="90" y="515" font-size="72" font-weight="800" fill="#fbbf24">cemitério de</text>
  <text x="90" y="600" font-size="72" font-weight="800" fill="#fbbf24">ferramentas.</text>

  <text x="90" y="760" font-size="40" font-weight="400" fill="#cbd5e1">Você assina, migra tudo pra lá e aprende</text>
  <text x="90" y="818" font-size="40" font-weight="400" fill="#cbd5e1">os nomes que ela dá pras coisas que você</text>
  <text x="90" y="876" font-size="40" font-weight="400" fill="#cbd5e1">já tinha nome.</text>

  <text x="90" y="978" font-size="40" font-weight="400" fill="#cbd5e1">Semanas depois, você gasta mais energia</text>
  <text x="90" y="1036" font-size="40" font-weight="400" fill="#cbd5e1">agradando a ferramenta do que tirando</text>
  <text x="90" y="1094" font-size="40" font-weight="400" fill="#cbd5e1">valor dela.</text>

  <text x="90" y="1255" font-size="32" font-weight="600" fill="#94a3b8">arraste  →</text>
  <text x="990" y="1255" font-size="32" font-weight="700" fill="#475569" text-anchor="end">02 / 05</text>
</svg>
