<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="DejaVu Sans, Helvetica, Arial, sans-serif">
  <rect width="1080" height="1350" fill="#0f172a"/>
  <rect x="0" y="0" width="1080" height="8" fill="#818cf8"/>
  <text x="90" y="160" font-size="30" font-weight="700" letter-spacing="6" fill="#818cf8">agent-team · OPEN SOURCE</text>

  <text x="90" y="320" font-size="64" font-weight="800" fill="#f8fafc">Um time de agentes</text>
  <text x="90" y="395" font-size="64" font-weight="800" fill="#f8fafc">dentro do seu repo.</text>

  <!-- flow -->
  <g>
    <circle cx="120" cy="540" r="11" fill="#64748b"/>
    <text x="160" y="552" font-size="40" font-weight="600" fill="#e2e8f0">Você descreve o objetivo</text>

    <circle cx="120" cy="650" r="11" fill="#818cf8"/>
    <text x="160" y="662" font-size="40" font-weight="600" fill="#e2e8f0">o <tspan fill="#818cf8" font-weight="800">team-leader</tspan> divide em tarefas</text>

    <circle cx="120" cy="760" r="11" fill="#34d399"/>
    <text x="160" y="772" font-size="40" font-weight="600" fill="#e2e8f0">os <tspan fill="#34d399" font-weight="800">workers</tspan> constroem em paralelo</text>
    <text x="160" y="822" font-size="34" font-weight="400" fill="#94a3b8">cada um na sua branch, abrindo PRs</text>

    <circle cx="120" cy="930" r="11" fill="#fbbf24"/>
    <text x="160" y="942" font-size="40" font-weight="600" fill="#e2e8f0">o <tspan fill="#fbbf24" font-weight="800">reviewer</tspan> revisa e faz o merge</text>
  </g>

  <text x="90" y="1080" font-size="38" font-weight="500" fill="#cbd5e1">Tudo em git e pull requests.</text>
  <text x="90" y="1132" font-size="38" font-weight="500" fill="#cbd5e1">Sem dashboard externo pra cuidar.</text>

  <text x="90" y="1255" font-size="32" font-weight="600" fill="#94a3b8">arraste  →</text>
  <text x="990" y="1255" font-size="32" font-weight="700" fill="#475569" text-anchor="end">03 / 05</text>
</svg>
